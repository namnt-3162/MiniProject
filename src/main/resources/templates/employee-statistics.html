<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thống kê nhân sự</title>
    <style>
        .stat-card { border: 1px solid #ddd; padding: 20px; margin-bottom: 20px; border-radius: 8px; background: #f9f9f9; }
        .count-highlight { font-size: 24px; color: #2c3e50; font-weight: bold; }
    </style>
</head>
<body>
<h2>Báo cáo & Thống kê</h2>

<div class="stat-card">
    <h3>Tổng số nhân viên trong hệ thống:
        <span class="count-highlight" th:text="${totalEmployees}">0</span>
    </h3>
</div>

<h3>Số lượng nhân viên theo phòng ban:</h3>
<table border="1" style="width: 50%; border-collapse: collapse;">
    <thead>
    <tr style="background-color: #eee;">
        <th>Tên Phòng Ban</th>
        <th>Số lượng nhân sự</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="stat : ${deptStats}">
        <td th:text="${stat.deptName != null ? stat.deptName : 'Chưa phân phòng'}"></td>
        <td th:text="${stat.employeeCount}" style="text-align: center;"></td>
    </tr>
    </tbody>
</table>
<br/>
<a th:href="@{/employees/list}">Quay lại danh sách</a>
</body>
</html>
